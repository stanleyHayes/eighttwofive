    <!-- Structured data: organisation + site (read by all crawlers) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Eight Two Five",
        "url": "https://eighttwofive.vercel.app",
        "logo": "https://eighttwofive.vercel.app/favicon.svg",
        "description": "Made-to-measure womenswear, cut to you in Accra. Limited, themed collections made to order.",
        "address": { "@type": "PostalAddress", "addressLocality": "Accra", "addressCountry": "GH" },
        "sameAs": ["https://instagram.com"]
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Eight Two Five",
        "url": "https://eighttwofive.vercel.app",
        "potentialAction": {
          "@type": "SearchAction",
          "target": {
            "@type": "EntryPoint",
            "urlTemplate": "https://eighttwofive.vercel.app/store?q={search_term_string}"
          },
          "query-input": "required name=search_term_string"
        }
      }
    </script>
    <style>
      html {
        background-color: #f4efe6;
      }
      /* Splash: shown until the app mounts, then fades out. */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #16120d;
        transition: opacity 420ms ease, visibility 420ms ease;
      }
      #splash.is-hidden {
        opacity: 0;
        visibility: hidden;
      }
      #splash svg {
        width: 72px;
        height: 72px;
        animation: splashPulse 1.4s ease-in-out infinite;
      }
      @keyframes splashPulse {
        0%, 100% { opacity: 0.55; transform: translateY(0); }
        50% { opacity: 1; transform: translateY(-3px); }
      }
      @media (prefers-reduced-motion: reduce) {
        #splash svg { animation: none; opacity: 1; }
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..700&family=Outfit:wght@300..700&family=IBM+Plex+Sans:wght@400;500;600&display=swap"

    <noscript>

      />
