services:
  - type: web
    name: eightfivetwo-api
    runtime: docker
    rootDir: services/api
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: ENV
        value: production
      - key: MONGODB_URI
        sync: false # set in Render dashboard (MongoDB Atlas connection string)
      - key: MONGODB_DB
        value: eightfivetwo
      # Public storefront origin used to build emailed links (magic sign-in,
      # payment links). Without it the API falls back to http://localhost:5173
      # and every emailed link is broken in production. No trailing slash.
      - key: WEB_URL
        value: https://eighttwofive.vercel.app
      - key: CORS_ALLOWED_ORIGINS
        sync: false # must include the WEB_URL origin, e.g. https://eighttwofive.vercel.app
      # Comma-separated admin emails — these accounts get the admin role at
      # login. Required, or no one can reach /admin in production.
      - key: ADMIN_EMAILS
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
