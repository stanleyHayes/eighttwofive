services:
  - type: web
    name: eightfivetwo-api
    runtime: docker
    rootDir: services/api
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /healthz
    envVars:
      - key: ENV
        value: production
      - key: MONGODB_URI
        sync: false # set in Render dashboard (MongoDB Atlas connection string)
      - key: MONGODB_DB
        value: eightfivetwo
      - key: CORS_ALLOWED_ORIGINS
        sync: false # e.g. https://eightfivetwo.vercel.app,https://eightfivetwo.com
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
